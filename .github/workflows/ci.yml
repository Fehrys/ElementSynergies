name: CI

# Canonical visual-regression environment for this repo:
#   GitHub Actions, runs-on: windows-2022, Playwright-managed Chromium,
#   the Playwright version resolved by package-lock.json (currently 1.61.1),
#   and the committed win32 snapshot family. See
#   docs/superpowers/plans/2026-07-12-responsive-layout-decisions.md.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_visual_snapshots:
        description: >-
          Recapture the Playwright visual baselines on this windows-2022 runner
          and upload them as an artifact (NOT committed). Leave false for a
          normal validating run.
        type: boolean
        default: false

jobs:
  build-and-test:
    runs-on: windows-2022

    env:
      # 'true' only for a workflow_dispatch run that explicitly opted in;
      # short-circuits to 'false' for push / pull_request events.
      UPDATE_SNAPSHOTS: ${{ github.event_name == 'workflow_dispatch' && inputs.update_visual_snapshots }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (locked)
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Unit tests (Vitest)
        run: npm test

      # Normal validating run: full e2e suite, comparing against the committed
      # win32 snapshots. Skipped when recapturing baselines.
      - name: E2E tests (Playwright)
        if: env.UPDATE_SNAPSHOTS != 'true'
        run: npm run test:e2e

      # Manual baseline recapture (workflow_dispatch + update_visual_snapshots=true).
      # Regenerates ONLY the visual-baseline snapshots on this windows-2022 runner.
      - name: Recapture visual baselines
        if: env.UPDATE_SNAPSHOTS == 'true'
        run: npx playwright test tests/e2e/visual-baseline.spec.ts --update-snapshots

      # Upload the regenerated snapshots for human review. They are deliberately
      # NOT committed by the workflow.
      - name: Upload recaptured snapshots
        if: env.UPDATE_SNAPSHOTS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: windows-2022-visual-snapshots
          path: tests/e2e/visual-baseline.spec.ts-snapshots/
          if-no-files-found: warn

      # Always publish the Playwright report (expected/actual/diff) when present,
      # so visual diffs from a normal run can be inspected.
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
